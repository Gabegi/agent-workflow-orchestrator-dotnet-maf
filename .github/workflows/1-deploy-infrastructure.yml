name: 1 - Deploy Infrastructure

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted]
    environment: prod
    steps:
      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ secrets.AZURE_TENANT_ID }}"
          echo "::add-mask::${{ secrets.ADMIN_OBJECT_ID }}"

      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete orphaned API connections
        run: |
          az resource delete --ids /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-happyliving-dev/providers/Microsoft.Web/connections/happyliving-sharepoint 2>/dev/null || true
          az resource delete --ids /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-happyliving-dev/providers/Microsoft.Web/connections/happyliving-search 2>/dev/null || true

      - uses: hashicorp/setup-terraform@v2

      - run: terraform init
        working-directory: ./infra
        env:
          ARM_USE_MSI: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - run: terraform apply -auto-approve
        working-directory: ./infra
        env:
          ARM_USE_MSI: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_admin_object_id: ${{ secrets.ADMIN_OBJECT_ID }}
